set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"
set -g extended-keys on
set -as terminal-features '*:extkeys'
set -g allow-passthrough on
set -g mouse on
set -g set-clipboard off

set -g prefix C-a
unbind C-a
bind-key C-a send-prefix

bind r source-file $HOME/.config/tmux/tmux.conf

unbind %
unbind '"'
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind -n S-Left  previous-window
bind -n S-Right next-window
bind -n M-H     previous-window
bind -n M-L     next-window

set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on


# Tokyonight Moon
thm_bg="#222436"
thm_fg="#c8d3f5"
thm_cyan="#86e1fc"
thm_gray="#3a3f5a"
thm_magenta="#c099ff"
thm_blue="#82aaff"
thm_black4="#444a73"
thm_orange="#ff966c"

set -g status-position top
set -g status-bg "${thm_bg}"
set -g status-justify "left"
set -g status-left-length 100
set -g status-right-length 100
set -g status-left "#[fg=${thm_bg},bg=${thm_magenta},bold] #S "

set -g status-right "#[fg=${thm_bg},bg=${thm_blue}]  #[fg=${thm_fg},bg=${thm_black4}] #{pane_current_command} #[fg=${thm_bg},bg=${thm_cyan}]  #[fg=${thm_fg},bg=${thm_black4}] %H:%M "

set -g window-status-separator " "
set -g window-status-style "fg=${thm_fg},bg=${thm_bg},none"
set -g window-status-activity-style "fg=${thm_fg},bg=${thm_bg},none"
set -g window-status-current-format "#[fg=${thm_bg},bg=${thm_orange},bold] #I #[fg=${thm_fg},bg=${thm_black4},nobold] #W "
set -g window-status-format "#[fg=${thm_gray},bg=${thm_black4}] #I #[fg=${thm_fg}] #W "

set -g pane-border-style "fg=${thm_gray}"
set -g pane-active-border-style "fg=${thm_blue}"
set -g message-style "fg=${thm_cyan},bg=${thm_gray},align=centre"
set -g message-command-style "fg=${thm_cyan},bg=${thm_gray},align=centre"
set -g clock-mode-colour "${thm_blue}"
set -g mode-style "fg=${thm_blue} bg=${thm_black4} bold"
